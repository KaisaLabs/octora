[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
octora_executor = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"
octora_mixer = "Ao58tvHj3FTwFMiGts5HAc5mastNE61Puiw4ER3rA3NJ"

[programs.localnet]
octora_executor = "86zj6EvHxMywP4Bw4EyZ2VcAjLm1pfGsc6ZjsZbrWwwc"
octora_mixer = "Ao58tvHj3FTwFMiGts5HAc5mastNE61Puiw4ER3rA3NJ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false

[[test.genesis]]
address = "LBUZKhRxPF3XUpBCjp4YzTKgLccjZhTSDM9YuVaPwxo"
program = "tests/fixtures/meteora_dlmm.so"

# Mainnet state cloned at validator startup so init_position can land on a
# real LB pair. Top SOL/USDC pair (`5rCf1…`) is small enough to clone fast and
# active enough that its state stays a useful integration target.
[test.validator]
url = "https://api.mainnet-beta.solana.com"

[[test.validator.clone]]
address = "5rCf1DM8LjKTw4YqhnoLcngyZYeNnQqztScTogYHAS6"   # SOL/USDC LB pair

[[test.validator.clone]]
address = "D1ZN9Wj1fRSUQfCjhvnu1hqDMT7hzjzBBpi12nVniYD6"   # DLMM event_authority PDA
